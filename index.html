<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Work Deck Interface</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
:root{
  --bg:#030509;
  --panel:#070b12;
  --panel2:#0b1018;
  --line:#66ff66;
  --line-dim:#1b743d;
  --cyan:#57e8ff;
  --green:#9dff6b;
  --amber:#ffe06b;
  --red:#ff4d4d;
  --text:#e9fff0;
  --muted:#8dbb9b;
  --dim:#526a5d;
  --done:#60746a;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background-color:#020305;
  background-image:
    radial-gradient(circle at 20% 0%, rgba(87,232,255,.08), transparent 35%),
    linear-gradient(rgba(102,255,102,.14) 1px, transparent 1px),
    linear-gradient(90deg, rgba(102,255,102,.10) 1px, transparent 1px),
    linear-gradient(180deg,#05070d,#020305);
  background-size:
    100% 100%,
    36px 36px,
    36px 36px,
    100% 100%;
  background-position:
    0 0,
    0 0,
    0 0,
    0 0;
  color:var(--text);
  font-family:"Courier New", Courier, monospace;
  -webkit-text-size-adjust:100%;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.13;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.09) 0px,
      rgba(255,255,255,.09) 1px,
      transparent 1px,
      transparent 4px
    );
  z-index:10;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.10;
  background:
    linear-gradient(to bottom, transparent 0%, rgba(102,255,102,.08) 15%, rgba(102,255,102,.08) 85%, transparent 100%);
  z-index:1;
}

#app{
  width:100vw;
  height:100vh;
  max-width:820px;
  margin:0 auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
  z-index:2;
}


/* Old WebKit safe frame spacing: avoids flex-gap. */
#app > * + *{
  margin-top:7px;
}

#dashboardPage > * + *{
  margin-top:7px;
}

.top > * + *{
  margin-left:7px;
}

.task-area > * + *{
  margin-top:7px;
}

.controls > * + *{
  margin-left:7px;
}

.frame{
  position:relative;
  background:
    linear-gradient(180deg, #070b12, #03060a);
  border:1px solid var(--line);
  box-shadow:
    inset 0 0 0 1px rgba(87,232,255,.12),
    0 0 0 1px rgba(3,5,9,.95),
    0 0 14px rgba(102,255,102,.12);
  clip-path:polygon(
    0 0,
    calc(100% - 18px) 0,
    100% 18px,
    100% 100%,
    18px 100%,
    0 calc(100% - 18px)
  );
}

.frame::before,
.frame::after{
  content:"";
  position:absolute;
  pointer-events:none;
  border-color:var(--cyan);
  opacity:.65;
}

.frame::before{
  top:5px;
  left:5px;
  width:34px;
  height:12px;
  border-top:2px solid;
  border-left:2px solid;
}

.frame::after{
  right:5px;
  bottom:5px;
  width:34px;
  height:12px;
  border-right:2px solid;
  border-bottom:2px solid;
}

.top{
  flex-shrink:0;
  display:flex;
  align-items:stretch;
}

.clock{
  flex:1.2;
  padding:15px 16px 12px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.calendar{
  flex:.8;
  padding:10px;
}

.label{
  color:var(--green);
  font-size:18px;
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:6px;
}

.label::before{
  content:"> ";
  color:var(--cyan);
}

.date{
  font-size:27px;
  line-height:1.1;
  font-weight:900;
  color:var(--text);
  text-shadow:0 0 7px rgba(157,255,107,.38);
}

.time{
  font-size:95px;
  line-height:.92;
  font-weight:900;
  letter-spacing:-3px;
  color:#f6fff8;
  text-shadow:
    0 0 8px rgba(102,255,102,.65),
    0 0 24px rgba(102,255,102,.22);
}

.status-lines{
  border-top:1px solid rgba(102,255,102,.35);
  padding-top:8px;
}

.info-line{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  gap:10px;
  margin-top:5px;
  font-size:23px;
  font-weight:900;
  color:var(--text);
}

.info-line span{
  color:var(--muted);
  text-transform:uppercase;
  font-size:18px;
  letter-spacing:1px;
}

.info-line strong{
  text-align:right;
}

.month-title{
  color:var(--green);
  text-align:center;
  font-size:20px;
  line-height:1;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:1px;
  padding:3px 0 8px;
  border-bottom:1px solid rgba(102,255,102,.28);
  margin-bottom:6px;
}

.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  grid-auto-rows:36px;
  text-align:center;
}

.cal-head{
  color:var(--cyan);
  font-size:18px;
  line-height:32px;
  font-weight:900;
}

.cal-day{
  font-size:18px;
  line-height:32px;
  font-weight:900;
  color:var(--text);
  border:1px solid transparent;
}

.cal-muted{
  color:#31473a;
}

.cal-today{
  color:#031008;
  background:var(--green);
  border-color:#d8ffbd;
  box-shadow:0 0 14px rgba(157,255,107,.55);
}

.task-area{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
}

.panel{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
}

#dailyPanel{
  flex:0 0 auto;
}

#todoPanel{
  flex:1 1 auto;
}

.panel-head{
  flex-shrink:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(102,255,102,.35);
  background:
    linear-gradient(90deg, rgba(102,255,102,.11), #0b1018 65%),
    #0b1018;
  padding:8px 10px;
}

.panel-title{
  color:var(--text);
  font-size:22px;
  line-height:1;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:2px;
}

.panel-title::before{
  content:"// ";
  color:var(--green);
  font-size:20px;
}

.panel-count{
  color:var(--cyan);
  font-size:18px;
  font-weight:900;
}

.list{
  flex:1;
  min-height:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:4px 8px;
}

.task{
  min-height:38px;
  display:flex;
  align-items:center;
  border-bottom:1px solid rgba(102,255,102,.12);
  font-size:18px;
  font-weight:800;
}

/* Old-iOS-safe task check control.
   This avoids native checkbox rendering glitches on iOS 12. */
.task-check-btn{
  -webkit-appearance:none;
  appearance:none;
  width:26px;
  height:26px;
  min-width:26px;
  flex-shrink:0;
  margin:0 10px 0 0;
  padding:0;
  border:2px solid var(--line);
  background:#020403;
  border-radius:0;
  box-shadow:
    inset 0 0 0 1px rgba(102,255,102,.14),
    0 0 7px rgba(102,255,102,.12);
}

.task-check-btn.is-done{
  background:var(--green);
  border-color:var(--green);
  box-shadow:
    0 0 9px rgba(157,255,107,.6),
    inset 0 0 0 3px #031008;
}

.task-check-btn:active{
  background:var(--cyan);
  border-color:var(--cyan);
}

/* Theme-matched scroll bars */
.list::-webkit-scrollbar{
  width:10px;
}

.list::-webkit-scrollbar-track{
  background:#020403;
  border-left:1px solid rgba(102,255,102,.22);
}

.list::-webkit-scrollbar-thumb{
  background:linear-gradient(180deg, var(--green), var(--line-dim));
  border:2px solid #020403;
  box-shadow:0 0 8px rgba(102,255,102,.35);
}

.list::-webkit-scrollbar-corner{
  background:#020403;
}

.task-text{
  flex:1;
  min-width:0;
  word-break:break-word;
  text-transform:uppercase;
  padding-right:6px;
}

.task.done .task-text{
  color:var(--done);
  text-decoration:line-through;
}

.carried-tag{
  color:var(--amber);
  font-size:18px;
  font-weight:900;
  margin-left:6px;
  text-transform:uppercase;
}

.task-actions{
  display:flex;
  flex-shrink:0;
  margin-left:5px;
}

.task-actions button{
  min-height:34px;
  padding:4px 8px;
}

button{
  -webkit-appearance:none;
  appearance:none;
  border:1px solid var(--line-dim);
  background:#08110c;
  color:var(--green);
  font-family:"Courier New", Courier, monospace;
  font-size:18px;
  font-weight:900;
  padding:5px 7px;
  margin-left:4px;
  border-radius:0;
  text-transform:uppercase;
}

button:active{
  background:var(--green);
  color:#031008;
}

.add{
  flex-shrink:0;
  display:flex;
  border-top:1px solid rgba(102,255,102,.35);
  background:#050805;
  padding:6px;
}

.add input,.add select{
  min-width:0;
  border:1px solid var(--line-dim);
  background:#020403;
  color:var(--text);
  font-family:"Courier New", Courier, monospace;
  font-size:18px;
  font-weight:800;
  padding:7px;
  margin-right:5px;
  border-radius:0;
  outline:none;
  text-transform:uppercase;
}

.add input::placeholder{
  color:#4f755b;
}

.add input{
  flex:1;
  width:1%;
}

.add select{
  width:62px;
  color:var(--green);
}

.empty{
  color:var(--dim);
  padding:10px 4px;
  font-size:18px;
  font-weight:900;
}

.empty::before{
  content:"NO DATA // ";
  color:var(--line-dim);
}

.controls{
  flex-shrink:0;
  height:36px;
  display:flex;
}

.controls button{
  flex:1;
  margin-left:0;
}

.toggle-completed{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  border:1px solid var(--line-dim);
  background:#050805;
  color:var(--green);
  font-size:18px;
  font-weight:900;
  text-transform:uppercase;
  transition:background .12s linear, color .12s linear, box-shadow .12s linear, border-color .12s linear;
}

.toggle-completed.is-on{
  background:var(--green);
  color:#031008;
  border-color:var(--green);
  box-shadow:
    0 0 10px rgba(157,255,107,.55),
    inset 0 0 0 2px rgba(3,16,8,.55);
}

.toggle-completed input{
  position:absolute;
  opacity:0;
  pointer-events:none;
}

/* No visible checkbox is shown for the SHOW COMPLETE control. */

@media (max-height:880px){
  .time{font-size:84px}
  .date{font-size:24px}
  .info-line{font-size:20px}
  .cal-grid{grid-auto-rows:30px}
  .cal-day{line-height:32px;font-size:18px}
  .task{min-height:38px;font-size:18px}
}

@media (orientation:landscape){
  body{overflow:auto}
  #app{
    width:768px;
    height:1024px;
    max-width:768px;
    max-height:1024px;
  }
}


/* Daily preset management page */
.page{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#dailyPresetsPage{
  display:none;
}

.preset-page{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  padding:10px;
}

.preset-header{
  flex-shrink:0;
  padding:10px 12px;
  border-bottom:1px solid rgba(102,255,102,.35);
  background:
    linear-gradient(90deg, rgba(102,255,102,.11), #0b1018 65%),
    #0b1018;
}

.preset-title{
  color:var(--text);
  font-size:22px;
  line-height:1;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:2px;
}

.preset-title::before{
  content:"// ";
  color:var(--green);
  font-size:20px;
}

.preset-subtitle{
  margin-top:6px;
  color:var(--muted);
  font-size:18px;
  font-weight:900;
  text-transform:uppercase;
}

.preset-list{
  flex:1;
  min-height:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:8px;
}

.day-block{
  border:1px solid rgba(102,255,102,.28);
  background:#050805;
  margin-bottom:8px;
}

.day-block:last-child{
  margin-bottom:0;
}

.day-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:7px 8px;
  border-bottom:1px solid rgba(102,255,102,.22);
  background:#08110c;
}

.day-name{
  color:var(--green);
  font-size:18px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:1px;
}

.day-count{
  color:var(--cyan);
  font-size:18px;
  font-weight:900;
}

.preset-task{
  min-height:38px;
  display:flex;
  align-items:center;
  border-bottom:1px solid rgba(102,255,102,.12);
  padding:4px 6px;
  font-size:18px;
  font-weight:800;
}

.preset-task:last-child{
  border-bottom:0;
}

.preset-task-text{
  flex:1;
  min-width:0;
  word-break:break-word;
  text-transform:uppercase;
  padding-right:6px;
}

.preset-actions{
  display:flex;
  flex-shrink:0;
}

.preset-actions button{
  min-height:34px;
  padding:4px 8px;
}

.preset-empty{
  color:var(--dim);
  padding:8px 6px;
  font-size:18px;
  font-weight:900;
  text-transform:uppercase;
}

.preset-add{
  flex-shrink:0;
  display:flex;
  border-top:1px solid rgba(102,255,102,.35);
  background:#050805;
  padding:6px;
}


.custom-day-select{
  width:100%;
  display:flex;
  flex-wrap:wrap;
  margin-bottom:6px;
}

.custom-day-select button{
  flex:1 0 20%;
  min-height:34px;
  margin:0;
  border:1px solid var(--line-dim);
  background:#020403;
  color:var(--green);
  font-family:"Courier New", Courier, monospace;
  font-size:18px;
  font-weight:900;
  padding:5px 4px;
  text-transform:uppercase;
}

.custom-day-select button + button{
  margin-left:-1px;
}

.custom-day-select button.day-selected{
  background:var(--green);
  color:#031008;
  border-color:var(--green);
  box-shadow:
    0 0 8px rgba(157,255,107,.5),
    inset 0 0 0 2px rgba(3,16,8,.55);
}

.preset-add{
  flex-wrap:wrap;
}

.preset-add input{
  margin-top:0;
}

.preset-add button{
  margin-left:0;
}

.preset-add select,
.preset-add input{
  min-width:0;
  border:1px solid var(--line-dim);
  background:#020403;
  color:var(--text);
  font-family:"Courier New", Courier, monospace;
  font-size:18px;
  font-weight:800;
  padding:7px;
  margin-right:5px;
  border-radius:0;
  outline:none;
  text-transform:uppercase;
}

.preset-add select{
  width:82px;
  color:var(--green);
}

.preset-add input{
  flex:1;
  width:1%;
}

.preset-add input::placeholder{
  color:#4f755b;
}

.page-controls{
  flex-shrink:0;
  height:36px;
  display:flex;
}

.page-controls > * + *{
  margin-left:7px;
}

.page-controls button{
  flex:1;
  margin-left:0;
}

/* Task panels use simple flex layout for better iOS 12 compatibility. */

</style>
</head>

<body>
<div id="app">
  <div id="dashboardPage" class="page">
  <div class="top">
    <div class="frame clock">
      <div>
        <div class="label">system time</div>
        <div class="date" id="dateText">Loading...</div>
      </div>
      <div class="time" id="timeText">--:--</div>
      <div class="status-lines">
        <div class="info-line"><span>GZAM</span><strong id="plus48Text">--</strong></div>
        <div class="info-line"><span>week</span><strong id="weekText">--</strong></div>
      </div>
    </div>

    <div class="frame calendar">
      <div class="month-title" id="monthTitle">Month</div>
      <div class="cal-grid" id="calendarGrid"></div>
    </div>
  </div>

  <div class="task-area">
    <div class="frame panel" id="dailyPanel">
      <div class="panel-head">
        <div class="panel-title">Daily</div>
        <div class="panel-count" id="dailySummary">0/0</div>
      </div>
      <div class="list" id="dailyList"></div>
      <div class="add">
        <input id="dailyInput" placeholder="ADD PRESET">
        <button onclick="addDailyPreset()">ADD</button>
      </div>
    </div>

    <div class="frame panel" id="todoPanel">
      <div class="panel-head">
        <div class="panel-title">To Do</div>
        <div class="panel-count" id="todoSummary">0/0</div>
      </div>
      <div class="list" id="todoList"></div>
      <div class="add">
        <input id="todoInput" placeholder="ADD TO DO">
        <button onclick="addTodo()">ADD</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <button onclick="showDailyPresetsPage()">DAILY LIST</button>
    <label class="toggle-completed" id="showCompletedLabel">
      <input type="checkbox" id="showCompletedToggle" onchange="toggleCompleted()">
      SHOW COMPLETE
    </label>
  </div>
  </div>

  <div id="dailyPresetsPage" class="page">
    <div class="frame preset-page">
      <div class="preset-header">
        <div class="preset-title">Daily Presets</div>
        <div class="preset-subtitle">Recurring weekday tasks</div>
        <div class="preset-subtitle" id="presetSyncStatus">LOCAL PRESETS LOADED</div>
      </div>

      <div class="preset-list" id="dailyPresetsList"></div>

      <div class="preset-add">
        <input type="hidden" id="presetDaySelect" value="1">

        <div class="custom-day-select" id="customDaySelect">
          <button type="button" class="day-selected" data-day="1" onclick="setPresetDay('1')">MON</button>
          <button type="button" data-day="2" onclick="setPresetDay('2')">TUE</button>
          <button type="button" data-day="3" onclick="setPresetDay('3')">WED</button>
          <button type="button" data-day="4" onclick="setPresetDay('4')">THU</button>
          <button type="button" data-day="5" onclick="setPresetDay('5')">FRI</button>
          
        </div>

        <input id="presetInput" placeholder="ADD DAILY PRESET">
        <button onclick="addPresetFromPage()">ADD</button>
      </div>
    </div>

    <div class="page-controls">
      <button onclick="showDashboardPage()">BACK TO DASHBOARD</button>
      <button onclick="loadDailyPresetsFromGithub()">REFRESH FROM GITHUB</button>
    </div>
  </div>
</div>

<script>
/*
  ============================================================
  HARDCODED TASKS SECTION
  ============================================================

  Put your default tasks in the `defaultState` object below.

  Daily preset task day codes:
    "1" = Monday
    "2" = Tuesday
    "3" = Wednesday
    "4" = Thursday
    "5" = Friday
    "6" = Saturday
    "0" = Sunday

  Example:
    "1": [
      { id: makeId(), text: "Check weekend handover" },
      { id: makeId(), text: "Review open faults" }
    ],

  To-do tasks:
    Put starting one-off tasks inside `oneOffTasks`, for example:
    oneOffTasks: [
      { id: makeId(), text: "Chase planner about access", done: false },
      { id: makeId(), text: "Update spreadsheet", done: false }
    ],

  IMPORTANT:
    The page stores tasks in browser storage after first use.
    If you change hardcoded tasks later and they do not appear,
    change STORE_KEY below to a new name, for example:
      var STORE_KEY = "workDeskTasksDark_v2";
*/

/* Change this to a new version name if you want to force the browser to load new hardcoded defaults. */
var STORE_KEY = "workDeskTasksDark_v1";

var DAILY_ROLLOVER_HOUR = 6;

/*
  Completed tasks are hidden by default.
  The on-screen toggle changes this to true while the page is open.
*/
var showCompleted = false;

function makeId(){ return "id_" + Math.random().toString(36).substr(2, 9) + "_" + Date.now(); }

var defaultState = {
  weeklyTasks: [],

dailyPresets: {
    "1": [
	  /* Monday tasks go here */
      { id: makeId(), text: "Check new sheet" },
      { id: makeId(), text: "Send items for calibration"}
    ],

    "2": [
	  /* Tuesday tasks go here */
      { id: makeId(), text: "Take calibration down" },
      { id: makeId(), text: "Complete EPOS" }
    ],

    "3": [
	  /* Wednesday tasks go here */
      { id: makeId(), text: "Copy over pway jobs" },
	  { id: makeId(), text: "Send pway cover sheet" }
    ],

    "4": [
	  /* Thursday tasks go here */
      { id: makeId(), text: "Repair and return" }
    ],

    "5": [
	  /* Friday tasks go here */
      { id: makeId(), text: "Send EPOS & WON" }
    ],

    "6": [
      /* Saturday tasks go here */
    ],

    "0": [
	  /* Sunday tasks go here */
    ]
  },

  oneOffTasks: [
    /* Starting to-do tasks go here, for example:
    { id: makeId(), text: "Chase access request", done: false },
    { id: makeId(), text: "Update spreadsheet", done: false }
    */
  ],

  dailyActive: [],
  lastDailyKey: null,
  lastWeeklyKey: null
};

/*
  ============================================================
  END OF HARDCODED TASKS SECTION
  You should not normally need to edit below this line.
  ============================================================
*/

function clone(obj){ return JSON.parse(JSON.stringify(obj)); }

function loadState(){
  try{
    var raw = localStorage.getItem(STORE_KEY);
    if(!raw) return clone(defaultState);
    var s = JSON.parse(raw);
    if(!s.weeklyTasks) s.weeklyTasks = [];
    if(!s.dailyPresets) s.dailyPresets = clone(defaultState.dailyPresets);
    if(!s.dailyActive) s.dailyActive = [];
    if(!s.oneOffTasks) s.oneOffTasks = [];
    ["0","1","2","3","4","5","6"].forEach(function(k){
      if(!s.dailyPresets[k]) s.dailyPresets[k] = [];
    });
    return s;
  }catch(e){
    return clone(defaultState);
  }
}

var state = loadState();

function saveState(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function pad2(n){ return n < 10 ? "0" + n : "" + n; }
function trim(s){ return String(s).replace(/^\s+|\s+$/g, ""); }

function startOfOperationalDay(now){
  var d = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if(now.getHours() < DAILY_ROLLOVER_HOUR) d.setDate(d.getDate() - 1);
  return d;
}

function dateKey(d){
  return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
}

function rolloverIfNeeded(){
  var now = new Date();
  var opDay = startOfOperationalDay(now);
  var todayKey = dateKey(opDay);
  var todayDow = String(opDay.getDay());

  if(state.lastDailyKey !== todayKey){
    var carried = [];

    for(var i=0;i<state.dailyActive.length;i++){
      var t = state.dailyActive[i];

      if(!t.done){
        t.carried = true;
        carried.push(t);
      }
    }

    var keptTodo = [];

    for(var td=0;td<state.oneOffTasks.length;td++){
      if(!state.oneOffTasks[td].done){
        keptTodo.push(state.oneOffTasks[td]);
      }
    }

    state.oneOffTasks = keptTodo;

    var todays = state.dailyPresets[todayDow] || [];
    var existing = {};

    for(var c=0;c<carried.length;c++){
      existing[carried[c].presetId || carried[c].id] = true;
    }

    for(var j=0;j<todays.length;j++){
      var p = todays[j];

      if(!existing[p.id]){
        carried.push({
          id: makeId(),
          presetId: p.id,
          text: p.text,
          done: false,
          carried: false,
          scheduledDow: todayDow,
          createdFor: todayKey
        });
      }
    }

    state.dailyActive = carried;
    state.lastDailyKey = todayKey;
    saveState();
  }
}

function dayName(d, longForm){
  var longDays = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var shortDays = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  return longForm ? longDays[d.getDay()] : shortDays[d.getDay()];
}

function monthName(d, longForm){
  var longMonths = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  var shortMonths = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return longForm ? longMonths[d.getMonth()] : shortMonths[d.getMonth()];
}

function formatDate(d){ return dayName(d, true) + " " + d.getDate() + " " + monthName(d, true) + " " + d.getFullYear(); }
function formatTime(d){ return pad2(d.getHours()) + ":" + pad2(d.getMinutes()); }
function formatShortDateTime(d){ return dayName(d, false) + " " + d.getDate() + " " + monthName(d, false) + " " + formatTime(d); }

function saturdayOnOrAfter(d){
  var x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  var day = x.getDay(); // 0 Sun, 1 Mon, ... 6 Sat
  var diff = (6 - day + 7) % 7;
  x.setDate(x.getDate() + diff);
  return x;
}

function financialWeek(now){
  var y = now.getFullYear();
  var fy = now.getMonth() >= 3 ? y : y - 1;

  var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var fw1 = saturdayOnOrAfter(new Date(fy, 3, 1));

  if(today < fw1){
    fy = fy - 1;
    fw1 = saturdayOnOrAfter(new Date(fy, 3, 1));
  }

  var nextFw1 = saturdayOnOrAfter(new Date(fy + 1, 3, 1));
  var days = Math.floor((today.getTime() - fw1.getTime()) / 86400000);
  var week = Math.floor(days / 7) + 1;

  var maxWeek = Math.floor((nextFw1.getTime() - fw1.getTime()) / 604800000);

  if(week < 1) week = 1;
  if(week > maxWeek) week = maxWeek;

  return week;
}

function renderCalendar(now){
  var grid = document.getElementById("calendarGrid");
  grid.innerHTML = "";
  document.getElementById("monthTitle").textContent = monthName(now, true) + " " + now.getFullYear();

  var heads = ["M","T","W","T","F","S","S"];
  for(var h=0; h<heads.length; h++){
    var hd = document.createElement("div");
    hd.className = "cal-head";
    hd.textContent = heads[h];
    grid.appendChild(hd);
  }

  var first = new Date(now.getFullYear(), now.getMonth(), 1);
  var start = new Date(first.getFullYear(), first.getMonth(), first.getDate());
  var firstDay = start.getDay();
  var offset = firstDay === 0 ? -6 : 1 - firstDay;
  start.setDate(start.getDate() + offset);

  for(var i=0; i<42; i++){
    var d = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
    var cell = document.createElement("div");
    var cls = "cal-day";
    if(d.getMonth() !== now.getMonth()) cls += " cal-muted";
    if(d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate()) cls += " cal-today";
    cell.className = cls;
    cell.textContent = d.getDate();
    grid.appendChild(cell);
  }
}

function updateTop(){
  var now = new Date();
  var p48 = new Date(now.getTime() + 48 * 60 * 60 * 1000);
  document.getElementById("dateText").textContent = formatDate(now);
  document.getElementById("timeText").textContent = formatTime(now);
  document.getElementById("plus48Text").textContent = formatShortDateTime(p48);
  document.getElementById("weekText").textContent = String(financialWeek(now));
  renderCalendar(now);
}

function resizeDailyPanel(){
  var taskArea = document.querySelector(".task-area");
  var dailyPanel = document.getElementById("dailyPanel");
  var todoPanel = document.getElementById("todoPanel");
  var dailyList = document.getElementById("dailyList");

  if(!taskArea || !dailyPanel || !todoPanel || !dailyList) return;

  var gap = 7;

  /*
    Maximum is the old equal-half panel size.
  */
  var maxDailyHeight = Math.floor((taskArea.clientHeight - gap) / 2);

  /*
    Count the currently visible Daily rows.
    This respects SHOW COMPLETE being on/off.
  */
  var visibleRows = dailyList.getElementsByClassName("task").length;

  var header = dailyPanel.getElementsByClassName("panel-head")[0];
  var addBar = dailyPanel.getElementsByClassName("add")[0];

  var headerHeight = header ? header.offsetHeight : 40;
  var addHeight = addBar ? addBar.offsetHeight : 48;

  var rowHeight = 38;
  var listPadding = 14;
  var frameAllowance = 8;

  var wantedHeight =
    headerHeight +
    addHeight +
    listPadding +
    frameAllowance +
    (visibleRows * rowHeight);

  var minDailyHeight = headerHeight + addHeight + 54;

  if(wantedHeight < minDailyHeight) wantedHeight = minDailyHeight;
  if(wantedHeight > maxDailyHeight) wantedHeight = maxDailyHeight;

  dailyPanel.style.height = wantedHeight + "px";
  todoPanel.style.height = "auto";
}
	
function render(){
  rolloverIfNeeded();
  renderDaily();
  renderTodo();
  updateTop();
  resizeDailyPanel();
}

function sortedTaskRefs(list){
  /*
    Returns task references sorted so completed tasks are first.
    Each entry keeps the original index so edit/delete/tick actions still update the correct stored task.
  */
  var refs = [];
  for(var i=0;i<list.length;i++){
    refs.push({ index:i, task:list[i] });
  }

  refs.sort(function(a,b){
    if(a.task.done === b.task.done) return a.index - b.index;
    return a.task.done ? -1 : 1;
  });

  return refs;
}

function updateToggleVisual(){
  var label = document.getElementById("showCompletedLabel");
  if(!label) return;
  if(showCompleted) label.className = "toggle-completed is-on";
  else label.className = "toggle-completed";
}

function toggleCompleted(){
  var toggle = document.getElementById("showCompletedToggle");
  showCompleted = toggle ? toggle.checked : false;
  updateToggleVisual();
  render();
}

function renderDaily(){
  var el = document.getElementById("dailyList");
  el.innerHTML = "";

  var done = 0, carried = 0, visible = 0;
  var refs = sortedTaskRefs(state.dailyActive);

  for(var r=0;r<refs.length;r++){
    var item = refs[r];
    if(item.task.done) done++;
    if(item.task.carried && !item.task.done) carried++;

    if(!showCompleted && item.task.done) continue;

    visible++;
    el.appendChild(taskRow("daily", item.index, item.task));
  }

  if(!state.dailyActive.length){
    el.innerHTML = '<div class="empty">DAILY QUEUE EMPTY</div>';
  }else if(!visible){
    el.innerHTML = '<div class="empty">ALL DAILY TASKS COMPLETE</div>';
  }

  var dailySummary = done + "/" + state.dailyActive.length;
  if(carried) dailySummary += " // " + carried + " CARRY";

  document.getElementById("dailySummary").textContent = dailySummary;
}

function renderTodo(){
  var el = document.getElementById("todoList");
  el.innerHTML = "";

  var done = 0, visible = 0;
  var refs = sortedTaskRefs(state.oneOffTasks);

  for(var r=0;r<refs.length;r++){
    var item = refs[r];
    if(item.task.done) done++;

    if(!showCompleted && item.task.done) continue;

    visible++;
    el.appendChild(taskRow("todo", item.index, item.task));
  }

  if(!state.oneOffTasks.length){
    el.innerHTML = '<div class="empty">TO DO QUEUE EMPTY</div>';
  }else if(!visible){
    el.innerHTML = '<div class="empty">ALL TO DO TASKS COMPLETE</div>';
  }

  var todoSummary = done + "/" + state.oneOffTasks.length;

  document.getElementById("todoSummary").textContent = todoSummary;
}

function taskRow(type, index, task){
  var row = document.createElement("div");
  row.className = "task" + (task.done ? " done" : "");

  var checkBtn = document.createElement("button");
  checkBtn.type = "button";
  checkBtn.className = "task-check-btn" + (task.done ? " is-done" : "");
  checkBtn.setAttribute("aria-label", task.done ? "Mark task incomplete" : "Mark task complete");
  checkBtn.setAttribute("data-type", type);
  checkBtn.setAttribute("data-index", index);
  checkBtn.onclick = function(){
    var t = this.getAttribute("data-type");
    var idx = parseInt(this.getAttribute("data-index"), 10);
    if(t === "todo") state.oneOffTasks[idx].done = !state.oneOffTasks[idx].done;
    else state.dailyActive[idx].done = !state.dailyActive[idx].done;
    saveState();
    render();
  };

  var text = document.createElement("div");
  text.className = "task-text";
  text.textContent = task.text;

  if(type === "daily" && task.carried && !task.done){
    var tag = document.createElement("span");
    tag.className = "carried-tag";
    tag.textContent = "CARRY";
    text.appendChild(tag);
  }

  var actions = document.createElement("div");
  actions.className = "task-actions";

  var edit = document.createElement("button");
  edit.textContent = "EDIT";
  edit.onclick = function(){ editTask(type, index); };

  var del = document.createElement("button");
  del.textContent = "DEL";
  del.onclick = function(){ deleteTask(type, index); };

  actions.appendChild(edit);
  actions.appendChild(del);

  row.appendChild(checkBtn);
  row.appendChild(text);
  row.appendChild(actions);

  return row;
}

function addDailyPreset(){
  var input = document.getElementById("dailyInput");
  var text = trim(input.value).toUpperCase();
  if(!text) return;

  /*
    daySelect was removed from the UI, so new daily tasks are now added
    to the current operational day automatically.
  */
  var dow = String(startOfOperationalDay(new Date()).getDay());

  if(!state.dailyPresets[dow]) state.dailyPresets[dow] = [];

  var p = { id: makeId(), text: text };
  state.dailyPresets[dow].push(p);

  state.dailyActive.push({
    id: makeId(),
    presetId: p.id,
    text: p.text,
    done: false,
    carried: false,
    scheduledDow: dow,
    createdFor: state.lastDailyKey
  });

  input.value = "";
  saveState();
  render();
}

function addTodo(){
  var input = document.getElementById("todoInput");
  var text = trim(input.value).toUpperCase();
  if(!text) return;
  state.oneOffTasks.push({ id: makeId(), text: text, done: false });
  input.value = "";
  saveState();
  render();
}

function editTask(type, index){
  var current = type === "todo" ? state.oneOffTasks[index].text : state.dailyActive[index].text;
  var updated = prompt("Edit task:", current);
  if(updated === null) return;
  updated = trim(updated).toUpperCase();
  if(!updated) return;

  if(type === "todo"){
    state.oneOffTasks[index].text = updated;
  }else{
    var active = state.dailyActive[index];
    active.text = updated;
    if(active.presetId && active.scheduledDow && state.dailyPresets[active.scheduledDow]){
      for(var i=0;i<state.dailyPresets[active.scheduledDow].length;i++){
        if(state.dailyPresets[active.scheduledDow][i].id === active.presetId){
          state.dailyPresets[active.scheduledDow][i].text = updated;
        }
      }
    }
  }

  saveState();
  render();
}

function deleteTask(type, index){
  var task = type === "todo" ? state.oneOffTasks[index] : state.dailyActive[index];
  if(!confirm("Delete task?\n\n" + task.text)) return;

  if(type === "todo"){
    state.oneOffTasks.splice(index, 1);
  }else{
    var active = state.dailyActive[index];
    state.dailyActive.splice(index, 1);
    if(active.presetId && active.scheduledDow && confirm("Also remove this from its future preset day?")){
      var arr = state.dailyPresets[active.scheduledDow] || [];
      for(var i=arr.length - 1; i>=0; i--){
        if(arr[i].id === active.presetId) arr.splice(i, 1);
      }
    }
  }

  saveState();
  render();
}



function showDailyPresetsPage(){
  var dashboard = document.getElementById("dashboardPage");
  var presets = document.getElementById("dailyPresetsPage");

  if(dashboard) dashboard.style.display = "none";
  if(presets) presets.style.display = "flex";

  renderDailyPresetsPage();
}

function showDashboardPage(){
  var dashboard = document.getElementById("dashboardPage");
  var presets = document.getElementById("dailyPresetsPage");

  if(presets) presets.style.display = "none";
  if(dashboard) dashboard.style.display = "flex";

  render();
}

function dailyPresetDayName(code){
  var names = {
    "1":"MONDAY",
    "2":"TUESDAY",
    "3":"WEDNESDAY",
    "4":"THURSDAY",
    "5":"FRIDAY",
    "6":"SATURDAY",
    "0":"SUNDAY"
  };

  return names[String(code)] || "UNKNOWN";
}

function renderDailyPresetsPage(){
  var el = document.getElementById("dailyPresetsList");
  if(!el) return;

  el.innerHTML = "";

  var order = ["1","2","3","4","5"];

  for(var i=0;i<order.length;i++){
    var dow = order[i];
    var tasks = state.dailyPresets[dow] || [];

    var block = document.createElement("div");
    block.className = "day-block";

    var head = document.createElement("div");
    head.className = "day-head";

    var name = document.createElement("div");
    name.className = "day-name";
    name.textContent = dailyPresetDayName(dow);

    var count = document.createElement("div");
    count.className = "day-count";
    count.textContent = tasks.length + " TASKS";

    head.appendChild(name);
    head.appendChild(count);
    block.appendChild(head);

    if(!tasks.length){
      var empty = document.createElement("div");
      empty.className = "preset-empty";
      empty.textContent = "NO DAILY PRESETS";
      block.appendChild(empty);
    }else{
      for(var j=0;j<tasks.length;j++){
        block.appendChild(presetTaskRow(dow, j, tasks[j]));
      }
    }

    el.appendChild(block);
  }
}

function presetTaskRow(dow, index, task){
  var row = document.createElement("div");
  row.className = "preset-task";

  var text = document.createElement("div");
  text.className = "preset-task-text";
  text.textContent = task.text;

  var actions = document.createElement("div");
  actions.className = "preset-actions";

  var edit = document.createElement("button");
  edit.textContent = "EDIT";
  edit.onclick = function(){
    editPresetTask(dow, index);
  };

  var del = document.createElement("button");
  del.textContent = "DEL";
  del.onclick = function(){
    deletePresetTask(dow, index);
  };

  actions.appendChild(edit);
  actions.appendChild(del);

  row.appendChild(text);
  row.appendChild(actions);

  return row;
}



function setPresetSyncStatus(text){
  var status = document.getElementById("presetSyncStatus");
  if(status) status.textContent = text;
}

function loadDailyPresetsFromGithub(){
  /*
    Loads daily preset tasks from daily-tasks.json in the same GitHub Pages folder
    as this HTML file.

    Expected file:
      daily-tasks.json
  */
  var xhr = new XMLHttpRequest();

  xhr.open("GET", "daily-tasks.json?cache=" + new Date().getTime(), true);

  xhr.onreadystatechange = function(){
    if(xhr.readyState === 4){
      if(xhr.status >= 200 && xhr.status < 300){
        try{
          var imported = JSON.parse(xhr.responseText);
          applyImportedDailyPresets(imported);
          setPresetSyncStatus("PRESETS UPDATED FROM GITHUB");
        }catch(e){
          setPresetSyncStatus("ERROR READING DAILY-TASKS.JSON");
          alert("Could not read daily-tasks.json");
        }
      }else{
        setPresetSyncStatus("ERROR LOADING DAILY-TASKS.JSON");
        alert("Could not load daily-tasks.json");
      }
    }
  };

  setPresetSyncStatus("LOADING DAILY-TASKS.JSON");
  xhr.send();
}

function applyImportedDailyPresets(imported){
  /*
    Replaces Monday-Friday daily presets with the contents of daily-tasks.json.
    Saturday and Sunday are kept empty.

    Existing active tasks are not wiped. If the JSON includes a task for the
    current operational day which is not already active, it is added to today's
    Daily list.
  */
  var days = ["1","2","3","4","5"];
  var newPresets = {
    "0": [],
    "1": [],
    "2": [],
    "3": [],
    "4": [],
    "5": [],
    "6": []
  };

  for(var i=0;i<days.length;i++){
    var dow = days[i];

    if(imported[dow] && imported[dow].length){
      for(var j=0;j<imported[dow].length;j++){
        var text = trim(imported[dow][j]).toUpperCase();

        if(text){
          newPresets[dow].push({
            id: makeId(),
            text: text
          });
        }
      }
    }
  }

  state.dailyPresets = newPresets;

  addMissingTodayPresetsToActiveList();

  saveState();
  renderDailyPresetsPage();
  render();
}

function addMissingTodayPresetsToActiveList(){
  var todayDow = String(startOfOperationalDay(new Date()).getDay());
  var todays = state.dailyPresets[todayDow] || [];

  var existingText = {};
  for(var i=0;i<state.dailyActive.length;i++){
    existingText[trim(state.dailyActive[i].text).toUpperCase()] = true;
  }

  for(var j=0;j<todays.length;j++){
    var text = trim(todays[j].text).toUpperCase();

    if(text && !existingText[text]){
      state.dailyActive.push({
        id: makeId(),
        presetId: todays[j].id,
        text: text,
        done: false,
        carried: false,
        scheduledDow: todayDow,
        createdFor: state.lastDailyKey
      });

      existingText[text] = true;
    }
  }
}


function setPresetDay(dow){
  var hidden = document.getElementById("presetDaySelect");
  if(hidden) hidden.value = String(dow);

  var wrap = document.getElementById("customDaySelect");
  if(!wrap) return;

  var buttons = wrap.getElementsByTagName("button");
  for(var i=0;i<buttons.length;i++){
    if(buttons[i].getAttribute("data-day") === String(dow)){
      buttons[i].className = "day-selected";
    }else{
      buttons[i].className = "";
    }
  }
}

function addPresetFromPage(){
  var daySelect = document.getElementById("presetDaySelect");
  var input = document.getElementById("presetInput");
  if(!daySelect || !input) return;

  var dow = String(daySelect.value);
  var text = trim(input.value).toUpperCase();
  if(!text) return;

  if(!state.dailyPresets[dow]) state.dailyPresets[dow] = [];

  var p = { id: makeId(), text: text };
  state.dailyPresets[dow].push(p);

  /*
    If adding a preset for the current operational day, also add it to today's active list.
  */
  var todayDow = String(startOfOperationalDay(new Date()).getDay());
  if(dow === todayDow){
    state.dailyActive.push({
      id: makeId(),
      presetId: p.id,
      text: p.text,
      done: false,
      carried: false,
      scheduledDow: dow,
      createdFor: state.lastDailyKey
    });
  }

  input.value = "";
  saveState();
  renderDailyPresetsPage();
}

function editPresetTask(dow, index){
  var tasks = state.dailyPresets[dow] || [];
  if(!tasks[index]) return;

  var current = tasks[index].text;
  var updated = prompt("Edit daily preset:", current);
  if(updated === null) return;

  updated = trim(updated).toUpperCase();
  if(!updated) return;

  tasks[index].text = updated;

  /*
    Update matching active daily tasks linked to this preset.
  */
  var presetId = tasks[index].id;
  for(var i=0;i<state.dailyActive.length;i++){
    if(state.dailyActive[i].presetId === presetId){
      state.dailyActive[i].text = updated;
    }
  }

  saveState();
  renderDailyPresetsPage();
}

function deletePresetTask(dow, index){
  var tasks = state.dailyPresets[dow] || [];
  if(!tasks[index]) return;

  var task = tasks[index];
  if(!confirm("Delete daily preset?\n\n" + task.text)) return;

  tasks.splice(index, 1);

  /*
    Remove matching active task if it was generated from this preset and is not carried.
    Carried tasks are left alone because they are already overdue active work.
  */
  for(var i=state.dailyActive.length - 1;i>=0;i--){
    if(state.dailyActive[i].presetId === task.id && !state.dailyActive[i].carried){
      state.dailyActive.splice(i, 1);
    }
  }

  saveState();
  renderDailyPresetsPage();
}

function bindEnter(id, fn){
  document.getElementById(id).onkeypress = function(e){
    e = e || window.event;
    var key = e.keyCode || e.which;
    if(key === 13){
      fn();
      return false;
    }
  };
}

bindEnter("dailyInput", addDailyPreset);
bindEnter("todoInput", addTodo);
bindEnter("presetInput", addPresetFromPage);

updateToggleVisual();
render();
setInterval(render, 1000);

window.onresize = function(){
  resizeDailyPanel();
};
